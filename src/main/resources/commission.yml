# 此文件只从插件 jar 的资源中读取，不会释放到插件数据目录，也不支持运行时重载。
# type 仅支持 submit_item（上交物品）或 kill_entity（击杀实体，minecraft:player 表示击杀玩家）。
# target 与 java-icon 使用原版 minecraft: 命名空间 ID；bedrock-icon 使用基岩版 textures/ 材质路径。
# 每名玩家每日固定从 simple、normal、hard 三个池分别随机抽取 2、2、1 个委托。
